<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" src="audio/music.mp3"></audio>

<!-- HERO -->
<div class="hero"></div>

<!-- TIMELINE -->
<section class="timeline">
  <h2>Wedding Day Story 💍</h2>
  <button onclick="startStory()">Start Story</button>
</section>

<!-- STORY -->
<div id="storyViewer" class="story" onclick="nextStory()">
  <img id="storyImage">
  <p id="storyCaption"></p>
</div>

<!-- END PAGE -->
<div id="endPage" class="end">
  <h1>❤️ Happy Anniversary ❤️</h1>
  <p>
    Once again, Happy Anniversary <br><br>
    Wishing you both a lifetime of love, happiness, and togetherness.  
    Your journey is truly inspiring 💖 <br><br>
    — From Nishu, Ithol & Monu
  </p>
</div>

<!-- GLIMPSES -->
<section class="glimpses">
  <h2>21 Years of Togetherness ❤️</h2>
  <div class="grid" id="glimpsesGrid"></div>
</section>

<!-- TOP BUTTON -->
<button id="topBtn">↑</button>

<script src="script.js"></script>
</body>
</html>
