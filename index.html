<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Anniversary ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<div class="hero"></div>

<!-- TIMELINE -->
<section class="timeline">
  <h2>Wedding Day Story 💍</h2>
  <button onclick="startStory()">Start Story</button>
</section>

<!-- STORY VIEWER -->
<div id="storyViewer" class="story">
  <img id="storyImage">
  <p id="storyCaption"></p>

  <div class="controls">
    <button onclick="prevStory()">⟨</button>
    <button onclick="nextStory()">⟩</button>
    <button onclick="closeStory()">✕</button>
  </div>
</div>

<!-- GLIMPSES -->
<section class="glimpses">
  <h2>21 Years of Togetherness ❤️</h2>
  <div class="grid" id="glimpsesGrid"></div>
</section>

<!-- SCROLL BUTTON -->
<button id="topBtn"><span>↑</span></button>

<script src="script.js"></script>
</body>
</html>
