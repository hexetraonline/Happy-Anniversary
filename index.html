<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" src="audio/music.mp3"></audio>

<div class="hero"></div>

<section class="timeline">
  <h2>Wedding Day Story 💍</h2>
  <button onclick="startStory()">Start Story</button>
</section>

<div id="storyViewer" class="story" onclick="nextStory()">
  <img id="storyImage">
  <p id="storyCaption"></p>
</div>

<div id="endPage" class="end">
  <div class="end-content">

    <h1>❤️ Happy Anniversary ❤️</h1>

    <p>
      Once again, Happy Anniversary 💖 <br><br>
      Your love story is truly inspiring.  
      May you always stay together with happiness, peace, and endless love ✨
    </p>

    <div class="signature">
      — From Nishu, Ithol & Monu
    </div>

    <br>

    <button onclick="goHome()">Back to Home</button>

  </div>
</div>

<section class="glimpses">
  <h2>21 Years of Togetherness ❤️</h2>
  <div class="grid" id="glimpsesGrid"></div>
</section>

<button id="topBtn">↑</button>

<script src="script.js"></script>
</body>
</html>
