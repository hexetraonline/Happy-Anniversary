<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Anniversary ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎬 CURTAIN -->
<div id="curtain">
  <div class="curtain left"></div>
  <div class="curtain right"></div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" src="audio/music.mp3" preload="auto"></audio>

<!-- HERO -->
<div class="hero"></div>

<!-- TIMELINE -->
<section class="timeline fade-in">
  <h2>Wedding Day Story 💍</h2>
  <button onclick="startStory()">Start Story</button>
</section>

<!-- GLIMPSES -->
<section class="glimpses fade-in">
  <h2>21 Years of Togetherness ❤️</h2>

  <div class="grid">
    <img src="images/glimpses/1.jpg">
    <img src="images/glimpses/2.jpg">
    <img src="images/glimpses/3.jpg">
    <img src="images/glimpses/4.jpg">
    <img src="images/glimpses/5.jpg">
    <img src="images/glimpses/6.jpg">
  </div>
</section>

<!-- 🎬 STORY MODAL -->
<div id="storyModal" class="modal">
  <div class="modal-content">
    <h2>Wedding Story 💍</h2>
    <p>Coming soon... ❤️</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- 🔝 SCROLL BUTTON -->
<button id="topBtn"><span>↑</span></button>

<script src="script.js"></script>
</body>
</html>
